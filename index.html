<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>漫天星河流星雨</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #020111 0%, #191621 100%);
        }
        canvas {
            display: block;
        }
        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(186, 85, 211, 0.6);
            pointer-events: none;
            letter-spacing: 5px;
            opacity: 0;
            transition: opacity 2s ease;
        }
        .text.show {
            opacity: 0.9;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            transition: opacity 1s ease;
        }
        .overlay.hide {
            opacity: 0;
            pointer-events: none;
        }
        .start-btn {
            color: white;
            font-family: 'Microsoft YaHei', sans-serif;
            font-size: 2rem;
            padding: 20px 50px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            letter-spacing: 3px;
        }
        .start-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay">
        <div class="start-btn">点击开启星河</div>
    </div>
    
    <div class="text" id="mainText">星河滚烫 你是人间理想</div>
    
    <canvas id="starfield"></canvas>

    <audio id="bgMusic" loop>
        <source src="River Flows In You - Yiruma.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const overlay = document.getElementById('overlay');
        const mainText = document.getElementById('mainText');
        const bgMusic = document.getElementById('bgMusic');

        let width, height;
        let stars = [];
        let started = false;

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.5; 
                this.len = Math.random() * 80 + 10;
                this.speed = Math.random() * 10 + 6;
                this.size = Math.random() * 2 + 0.1;
                const colors = ['#ffffff', '#a6c0fe', '#f68084', '#cfd9df', '#e2ebf0'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.waitTime = Math.random() * 100;
                this.active = false;
            }

            update() {
                if (this.waitTime > 0) {
                    this.waitTime--;
                    return;
                }
                this.active = true;
                this.x -= this.speed;
                this.y += this.speed;

                if (this.x < -this.len || this.y > height + this.len) {
                    this.reset();
                }
            }

            draw() {
                if (!this.active) return;
                ctx.beginPath();
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.size;
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + this.len, this.y - this.len);
                ctx.stroke();
            }
        }

        for (let i = 0; i < 150; i++) {
            stars.push(new Star());
        }

        function animate() {
            if (!started) return;
            ctx.fillStyle = 'rgba(2, 1, 17, 0.2)';
            ctx.fillRect(0, 0, width, height);

            stars.forEach(star => {
                star.update();
                star.draw();
            });

            requestAnimationFrame(animate);
        }

        overlay.addEventListener('click', function() {
            started = true;
            overlay.classList.add('hide');
            mainText.classList.add('show');
            bgMusic.play();
            animate();
        });
    </script>
</body>
</html>
